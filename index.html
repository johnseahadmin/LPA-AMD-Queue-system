<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPA & AMD Session Manager</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EEE8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1A1916;
    --text2: #6B6A64;
    --text3: #9C9B95;
    --accent: #2B5BE8;
    --accent-bg: #EBF0FD;
    --green: #1D7A4E;
    --green-bg: #E8F5EE;
    --red: #B83030;
    --red-bg: #FAEAEA;
    --amber: #8A5A00;
    --amber-bg: #FEF3DC;
    --purple: #5B3DB5;
    --purple-bg: #EEEAFD;
    --radius: 10px;
    --radius-lg: 16px;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }
  /* NAV */
  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 0;
    height: 56px;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-brand {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    margin-right: auto;
  }
  .nav-tab {
    height: 56px;
    padding: 0 1.25rem;
    border: none;
    background: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  /* LAYOUT */
  .page { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }
  .page-wide { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .page-full { padding: 2rem 1.5rem; }
  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
  }
  .card + .card { margin-top: 1rem; }
  /* BADGES */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500;
    padding: 3px 10px;
    border-radius: 100px;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-accent { background: var(--accent-bg); color: var(--accent); }
  .badge-purple { background: var(--purple-bg); color: var(--purple); }
  .badge-gray { background: var(--surface2); color: var(--text2); }
  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: var(--radius);
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border2);
    background: var(--surface); color: var(--text);
    transition: background 0.12s, transform 0.1s;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn-primary:hover { background: #1E4CD4; }
  .btn-green { background: var(--green); color: #fff; border-color: transparent; }
  .btn-green:hover { background: #165E3C; }
  .btn-red { background: var(--red); color: #fff; border-color: transparent; }
  .btn-red:hover { background: #952828; }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-xs { padding: 3px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  /* INPUTS */
  .input-group { margin-bottom: 1rem; }
  .input-label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  .input {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border2); border-radius: var(--radius);
    font-family: inherit; font-size: 14px; color: var(--text);
    background: var(--surface); outline: none;
    transition: border-color 0.15s;
  }
  .input:focus { border-color: var(--accent); }
  select.input { cursor: pointer; }
  /* SLOT GRID */
  .slot-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
  }
  .slot-btn {
    padding: 10px 8px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
    color: var(--text);
  }
  .slot-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .slot-btn.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .slot-btn:disabled { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; }
  /* ATTENDEE ROW */
  .attendee-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .attendee-row:last-child { border-bottom: none; }
  .attendee-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--text2);
    flex-shrink: 0;
  }
  .attendee-info { flex: 1; min-width: 0; }
  .attendee-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .attendee-meta { font-size: 12px; color: var(--text3); }
  .attendee-actions { display: flex; gap: 6px; flex-shrink: 0; }
  /* ROOM CARDS */
  .room-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .room-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
  }
  /* DISPLAY PANEL */
  .display-root {
    min-height: 100vh;
    background: #0D0D0D;
    color: #F0EEE8;
    font-family: 'DM Sans', sans-serif;
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .display-header {
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .display-title { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }
  .display-date { font-size: 13px; color: #666; margin-top: 4px; }
  .display-clock { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 400; color: #F0EEE8; }
  .display-rooms { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
  .display-room {
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    border-radius: 18px;
    padding: 2rem;
    min-height: 220px;
  }
  .display-room-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 8px; }
  .display-room-name { font-size: 22px; font-weight: 600; color: #F0EEE8; margin-bottom: 4px; }
  .display-room-doctor { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .display-current-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 8px; }
  .display-current-name {
    font-size: 32px; font-weight: 600; color: #F0EEE8; line-height: 1.1;
  }
  .display-current-type { display: flex; gap: 8px; margin-top: 10px; }
  .display-pill {
    padding: 4px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
  }
  .display-pill-lpa { background: #1D3A8A; color: #B0C4FF; }
  .display-pill-amd { background: #2A5A35; color: #90E0A8; }
  .display-next { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid #2A2A2A; }
  .display-next-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #444; margin-bottom: 6px; }
  .display-next-name { font-size: 18px; color: #777; }
  .display-waiting {
    background: #1A1A1A; border: 1px solid #2A2A2A;
    border-radius: 18px; padding: 1.5rem 2rem;
  }
  .display-waiting-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 12px; }
  .display-waiting-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .display-waiting-chip {
    background: #222; border: 1px solid #333;
    border-radius: 100px;
    padding: 5px 14px; font-size: 13px; color: #999;
  }
  /* UTILS */
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 12px; }
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .mb-4 { margin-bottom: 1rem; }
  .mb-2 { margin-bottom: 0.5rem; }
  .mt-4 { margin-top: 1rem; }
  .mt-2 { margin-top: 0.5rem; }
  .text-muted { color: var(--text2); }
  .text-sm { font-size: 13px; }
  .text-xs { font-size: 12px; }
  .mono { font-family: 'DM Mono', monospace; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  .empty-state { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 14px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .success-card {
    background: var(--green-bg); border: 1px solid #A0D4BC;
    border-radius: var(--radius-lg); padding: 2rem; text-align: center;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg);
    padding: 1.75rem; width: 100%; max-width: 480px;
    border: 1px solid var(--border);
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── CONSTANTS ───────────────────────────────────────────────────────────────
const SESSION_START = { h: 13, m: 30 };
const SESSION_END   = { h: 17, m: 30 };
const SLOT_MINUTES  = 15;

function generateSlots() {
  const slots = [];
  let h = SESSION_START.h, m = SESSION_START.m;
  while (h < SESSION_END.h || (h === SESSION_END.h && m < SESSION_END.m)) {
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    m += SLOT_MINUTES;
    if (m >= 60) { m -= 60; h++; }
  }
  return slots;
}
const ALL_SLOTS = generateSlots();

// ── STORAGE ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'lpa_amd_session_v3';
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return null;
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

// ── DEFAULT STATE ────────────────────────────────────────────────────────────
function defaultState() {
  return {
    sessionDate: '2026-06-14',
    sessionLabel: 'LPA & AMD Certification – 14 Jun 2026',
    rooms: [
      { id: 'r1', name: 'Room 1', doctor: 'Dr. Tan Wei Ming' },
      { id: 'r2', name: 'Room 2', doctor: 'Dr. Sarah Lim' },
    ],
    bookings: [],   // { id, name, nric, phone, slot, services:['lpa','amd'], status:'booked'|'arrived'|'in_room_r1'|'in_room_r2'|'done', roomId:null, addAmd:false, notes:'' }
    currentInRoom: { r1: null, r2: null }, // booking id
    nextUpInRoom:  { r1: null, r2: null },
    facilitatorPin: '1234',
  };
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function formatSlot(slot) {
  const [h, m] = slot.split(':').map(Number);
  const suffix = h >= 12 ? 'pm' : 'am';
  const h12 = h > 12 ? h - 12 : h;
  return `${h12}:${String(m).padStart(2,'0')} ${suffix}`;
}
function uid() { return Math.random().toString(36).slice(2, 9); }
function slotTaken(bookings, slot) {
  return bookings.filter(b => b.slot === slot && b.status !== 'cancelled').length >= 2;
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════
export default function App() {
  const [panel, setPanel] = useState('client');
  const [state, setState] = useState(() => loadState() || defaultState());
  const [pinModal, setPinModal] = useState(null); // 'facilitator' | 'doctor'
  const [pinInput, setPinInput] = useState('');
  const [pinError, setPinError] = useState(false);
  const [unlockedRole, setUnlockedRole] = useState(null); // null | 'facilitator' | 'doctor'

  const update = useCallback((fn) => {
    setState(prev => {
      const next = fn(prev);
      saveState(next);
      return next;
    });
  }, []);

  // sync across tabs via storage event
  useEffect(() => {
    const handler = (e) => {
      if (e.key === STORAGE_KEY && e.newValue) {
        try { setState(JSON.parse(e.newValue)); } catch {}
      }
    };
    window.addEventListener('storage', handler);
    return () => window.removeEventListener('storage', handler);
  }, []);

  function requestPanel(p) {
    if (p === 'display') { setPanel(p); return; }
    if (p === 'client') { setPanel(p); return; }
    if (p === 'facilitator') {
      if (unlockedRole === 'facilitator' || unlockedRole === 'doctor') { setPanel(p); return; }
      setPinModal('facilitator');
      setPinInput(''); setPinError(false);
      return;
    }
  }

  function submitPin() {
    if (pinInput === state.facilitatorPin) {
      setUnlockedRole(pinModal);
      setPinModal(null);
      setPanel('facilitator');
    } else {
      setPinError(true);
      setPinInput('');
    }
  }

  return (
    <div>
      <nav className="nav">
        <span className="nav-brand">LPA · AMD</span>
        {[
          {id:'client', label:'Book a Slot'},
          {id:'facilitator', label:'Facilitator'},
          {id:'display', label:'Display Screen'},
        ].map(t => (
          <button key={t.id} className={`nav-tab${panel===t.id?' active':''}`}
            onClick={() => requestPanel(t.id)}>{t.label}</button>
        ))}
      </nav>

      {panel === 'client'      && <ClientPanel state={state} update={update} />}
      {panel === 'facilitator' && <FacilitatorPanel state={state} update={update} unlockedRole={unlockedRole} />}
      {panel === 'display'     && <DisplayPanel state={state} />}

      {pinModal && (
        <div className="modal-overlay" onClick={() => setPinModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-title">Enter Facilitator PIN</div>
            <input className="input mb-4" type="password" placeholder="PIN"
              value={pinInput} onChange={e => { setPinInput(e.target.value); setPinError(false); }}
              onKeyDown={e => e.key==='Enter' && submitPin()} autoFocus />
            {pinError && <p style={{color:'var(--red)',fontSize:13,marginBottom:'0.75rem'}}>Incorrect PIN. Try again.</p>}
            <div className="flex gap-8">
              <button className="btn btn-primary" style={{flex:1}} onClick={submitPin}>Unlock</button>
              <button className="btn" onClick={() => setPinModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// CLIENT PANEL
// ═══════════════════════════════════════════════════════════════════════════
function ClientPanel({ state, update }) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ name:'', nric:'', phone:'', services:[], slot:'', notes:'' });
  const [submitted, setSubmitted] = useState(null);

  function setField(k, v) { setForm(f => ({...f, [k]: v})); }

  function toggleService(s) {
    setForm(f => ({
      ...f,
      services: f.services.includes(s) ? f.services.filter(x=>x!==s) : [...f.services, s]
    }));
  }

  function canProceed1() {
    return form.name.trim() && form.nric.trim().length >= 4 && form.phone.trim() && form.services.length > 0;
  }

  function submit() {
    const booking = {
      id: uid(), ...form,
      name: form.name.trim(),
      nric: form.nric.trim().toUpperCase(),
      phone: form.phone.trim(),
      status: 'booked',
      roomId: null,
      addAmd: false,
      bookedAt: Date.now(),
    };
    update(s => ({ ...s, bookings: [...s.bookings, booking] }));
    setSubmitted(booking);
  }

  function reset() {
    setForm({ name:'', nric:'', phone:'', services:[], slot:'', notes:'' });
    setStep(1); setSubmitted(null);
  }

  if (submitted) {
    return (
      <div className="page">
        <div className="success-card" style={{marginTop:'2rem'}}>
          <div style={{fontSize:40,marginBottom:'1rem'}}>✓</div>
          <div style={{fontSize:20,fontWeight:600,color:'var(--green)',marginBottom:'0.5rem'}}>Booking Confirmed</div>
          <div style={{fontSize:14,color:'var(--green)',marginBottom:'1.5rem'}}>
            Your slot has been reserved. Please arrive a few minutes early.
          </div>
          <div className="card" style={{textAlign:'left',marginBottom:'1.25rem'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem'}}>
              <div>
                <div className="text-xs text-muted">Name</div>
                <div style={{fontWeight:500}}>{submitted.name}</div>
              </div>
              <div>
                <div className="text-xs text-muted">NRIC (last 4)</div>
                <div style={{fontWeight:500,fontFamily:'DM Mono'}}>{submitted.nric}</div>
              </div>
              <div>
                <div className="text-xs text-muted">Time Slot</div>
                <div style={{fontWeight:500,fontFamily:'DM Mono'}}>{formatSlot(submitted.slot)}</div>
              </div>
              <div>
                <div className="text-xs text-muted">Services</div>
                <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                  {submitted.services.map(s => (
                    <span key={s} className={`badge badge-${s==='lpa'?'accent':'purple'}`}>{s.toUpperCase()}</span>
                  ))}
                </div>
              </div>
              <div>
                <div className="text-xs text-muted">Date</div>
                <div style={{fontWeight:500}}>{state.sessionDate}</div>
              </div>
              <div>
                <div className="text-xs text-muted">Ref ID</div>
                <div style={{fontWeight:500,fontFamily:'DM Mono',fontSize:12}}>{submitted.id.toUpperCase()}</div>
              </div>
            </div>
          </div>
          <button className="btn btn-primary" onClick={reset}>Book Another</button>
        </div>
      </div>
    );
  }

  return (
    <div className="page">
      <div style={{marginBottom:'1.5rem'}}>
        <h1 style={{fontSize:22,fontWeight:600,marginBottom:4}}>{state.sessionLabel}</h1>
        <p className="text-muted text-sm">Select your preferred 15-minute slot and complete your details below.</p>
      </div>

      {/* Step indicator */}
      <div className="flex gap-8" style={{marginBottom:'1.5rem'}}>
        {[1,2,3].map(n => (
          <div key={n} className="flex-center gap-8">
            <div style={{
              width:26,height:26,borderRadius:'50%',
              background: step>=n ? 'var(--accent)' : 'var(--surface2)',
              color: step>=n ? '#fff' : 'var(--text3)',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:12,fontWeight:600,flexShrink:0
            }}>{n}</div>
            <span style={{fontSize:13,color: step===n ? 'var(--text)' : 'var(--text3)',fontWeight: step===n?500:400}}>
              {n===1?'Your Details':n===2?'Choose Slot':'Confirm'}
            </span>
            {n<3 && <span style={{color:'var(--text3)',margin:'0 4px'}}>›</span>}
          </div>
        ))}
      </div>

      {/* STEP 1 */}
      {step===1 && (
        <div className="card">
          <div className="input-group">
            <label className="input-label">Full Name</label>
            <input className="input" placeholder="As per NRIC" value={form.name} onChange={e=>setField('name',e.target.value)} />
          </div>
          <div className="grid-2">
            <div className="input-group">
              <label className="input-label">NRIC / Last 4 characters</label>
              <input className="input mono" placeholder="e.g. 123A" value={form.nric} onChange={e=>setField('nric',e.target.value)} maxLength={9} />
            </div>
            <div className="input-group">
              <label className="input-label">Mobile Number</label>
              <input className="input" placeholder="+65 9xxx xxxx" value={form.phone} onChange={e=>setField('phone',e.target.value)} />
            </div>
          </div>
          <div className="input-group" style={{marginBottom:0}}>
            <label className="input-label">Services Required</label>
            <div className="flex gap-12 mt-2">
              {[['lpa','LPA – Lasting Power of Attorney'],['amd','AMD – Advance Medical Directive']].map(([val,label]) => (
                <label key={val} className="flex-center gap-8" style={{cursor:'pointer',userSelect:'none'}}>
                  <input type="checkbox" checked={form.services.includes(val)} onChange={()=>toggleService(val)} />
                  <span style={{fontSize:14}}>{label}</span>
                </label>
              ))}
            </div>
          </div>
          <div className="input-group" style={{marginTop:'1rem'}}>
            <label className="input-label">Notes (optional)</label>
            <input className="input" placeholder="Any special requirements" value={form.notes} onChange={e=>setField('notes',e.target.value)} />
          </div>
          <div style={{marginTop:'1.25rem'}}>
            <button className="btn btn-primary" disabled={!canProceed1()} onClick={()=>setStep(2)}>
              Choose Time Slot →
            </button>
          </div>
        </div>
      )}

      {/* STEP 2 – slots */}
      {step===2 && (
        <div className="card">
          <p className="text-sm text-muted mb-4" style={{marginBottom:'1rem'}}>
            Each slot is 15 minutes. Greyed-out slots are fully booked.
          </p>
          <div className="slot-grid">
            {ALL_SLOTS.map(slot => {
              const full = slotTaken(state.bookings, slot);
              return (
                <button key={slot}
                  className={`slot-btn${form.slot===slot?' selected':''}`}
                  disabled={full}
                  onClick={()=>setField('slot',slot)}>
                  {formatSlot(slot)}
                  {full && <div style={{fontSize:10,opacity:0.7}}>Full</div>}
                </button>
              );
            })}
          </div>
          <div className="flex gap-8" style={{marginTop:'1.25rem'}}>
            <button className="btn" onClick={()=>setStep(1)}>← Back</button>
            <button className="btn btn-primary" disabled={!form.slot} onClick={()=>setStep(3)}>
              Review Booking →
            </button>
          </div>
        </div>
      )}

      {/* STEP 3 – confirm */}
      {step===3 && (
        <div className="card">
          <div className="section-title">Confirm your booking</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem',marginBottom:'1.25rem'}}>
            {[
              ['Name', form.name],
              ['NRIC', form.nric],
              ['Phone', form.phone],
              ['Time Slot', formatSlot(form.slot)],
              ['Services', form.services.map(s=>s.toUpperCase()).join(' + ')],
              ['Date', state.sessionDate],
            ].map(([k,v]) => (
              <div key={k}>
                <div className="text-xs text-muted">{k}</div>
                <div style={{fontWeight:500,fontFamily: k==='Time Slot'||k==='NRIC'?'DM Mono':'inherit'}}>{v}</div>
              </div>
            ))}
          </div>
          {form.notes && <div className="mb-4 text-sm text-muted">Note: {form.notes}</div>}
          <div className="flex gap-8">
            <button className="btn" onClick={()=>setStep(2)}>← Back</button>
            <button className="btn btn-primary" onClick={submit}>Confirm Booking ✓</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// FACILITATOR PANEL
// ═══════════════════════════════════════════════════════════════════════════
function FacilitatorPanel({ state, update, unlockedRole }) {
  const [tab, setTab] = useState('attendance');
  const [editRoomModal, setEditRoomModal] = useState(null);
  const [addAmdModal, setAddAmdModal] = useState(null);
  const [settingsModal, setSettingsModal] = useState(false);

  // Sort bookings by slot
  const sortedBookings = [...state.bookings].sort((a,b) => a.slot.localeCompare(b.slot));
  const arrivedBookings = sortedBookings.filter(b => b.status === 'arrived');
  const waitingQueue = sortedBookings.filter(b => b.status === 'arrived');
  const bookedBookings = sortedBookings.filter(b => b.status === 'booked');
  const doneBookings = sortedBookings.filter(b => b.status === 'done');

  function markArrived(id) {
    update(s => ({...s, bookings: s.bookings.map(b => b.id===id ? {...b,status:'arrived'} : b)}));
  }
  function markAbsent(id) {
    update(s => ({...s, bookings: s.bookings.map(b => b.id===id ? {...b,status:'absent'} : b)}));
  }
  function markUnarrived(id) {
    update(s => ({...s, bookings: s.bookings.map(b => b.id===id ? {...b,status:'booked'} : b)}));
  }
  function callToRoom(bookingId, roomId) {
    update(s => {
      const bookings = s.bookings.map(b => b.id===bookingId ? {...b, status:`in_room_${roomId}`, roomId} : b);
      const currentInRoom = {...s.currentInRoom, [roomId]: bookingId};
      return {...s, bookings, currentInRoom};
    });
  }
  function markDone(bookingId, roomId) {
    update(s => {
      const bookings = s.bookings.map(b => b.id===bookingId ? {...b, status:'done', roomId} : b);
      const currentInRoom = {...s.currentInRoom, [roomId]: null};
      return {...s, bookings, currentInRoom};
    });
  }
  function addWalkIn(data) {
    const booking = {
      id: uid(), ...data,
      status: 'arrived',
      roomId: null, addAmd: false,
      bookedAt: Date.now(),
    };
    update(s => ({...s, bookings: [...s.bookings, booking]}));
  }

  // Find who's currently in each room
  function getCurrentForRoom(roomId) {
    return state.bookings.find(b => b.status === `in_room_${roomId}`);
  }

  const tabs = [
    {id:'attendance', label:'Attendance'},
    {id:'queue',      label:'Queue & Rooms'},
    {id:'overview',   label:'All Bookings'},
  ];

  return (
    <div className="page-wide">
      {/* header */}
      <div className="flex-center gap-12" style={{marginBottom:'1.5rem',flexWrap:'wrap'}}>
        <div style={{flex:1}}>
          <h1 style={{fontSize:20,fontWeight:600}}>{state.sessionLabel}</h1>
          <p className="text-sm text-muted">
            {state.bookings.length} bookings · {arrivedBookings.length} arrived · {doneBookings.length} done
          </p>
        </div>
        <div className="flex gap-8">
          <button className="btn btn-sm" onClick={()=>setAddAmdModal({walkIn:true})}>+ Walk-in</button>
          <button className="btn btn-sm" onClick={()=>setSettingsModal(true)}>⚙ Settings</button>
        </div>
      </div>

      {/* sub-tabs */}
      <div className="flex gap-8" style={{marginBottom:'1.25rem',borderBottom:'1px solid var(--border)',paddingBottom:'0'}}>
        {tabs.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{
              padding:'8px 16px', background:'none', border:'none',
              fontFamily:'inherit', fontSize:14, fontWeight:500, cursor:'pointer',
              color: tab===t.id ? 'var(--accent)' : 'var(--text2)',
              borderBottom: tab===t.id ? '2px solid var(--accent)' : '2px solid transparent',
              marginBottom:'-1px',
            }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ATTENDANCE TAB */}
      {tab==='attendance' && (
        <div>
          <div className="card mb-4">
            <div className="section-title">Registered — mark attendance as clients arrive</div>
            {bookedBookings.length === 0
              ? <div className="empty-state">No unconfirmed bookings</div>
              : bookedBookings.map((b,i) => (
                <AttendeeRow key={b.id} booking={b} index={i+1}
                  actions={[
                    <button className="btn btn-sm btn-green" onClick={()=>markArrived(b.id)}>✓ Arrived</button>,
                    <button className="btn btn-sm btn-red" onClick={()=>markAbsent(b.id)}>Absent</button>,
                  ]} />
              ))
            }
          </div>
          <div className="card">
            <div className="section-title">Arrived ({arrivedBookings.length})</div>
            {arrivedBookings.length === 0
              ? <div className="empty-state">No one arrived yet</div>
              : arrivedBookings.map((b,i) => (
                <AttendeeRow key={b.id} booking={b} index={i+1}
                  actions={[
                    <button className="btn btn-xs" onClick={()=>markUnarrived(b.id)}>Undo</button>,
                  ]} />
              ))
            }
          </div>
        </div>
      )}

      {/* QUEUE & ROOMS TAB */}
      {tab==='queue' && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',alignItems:'start'}}>
          {state.rooms.map(room => {
            const current = getCurrentForRoom(room.id);
            const queue = waitingQueue.filter(b => !getCurrentForRoom(b.roomId || ''));
            return (
              <div key={room.id} className="card">
                <div className="flex-center gap-8" style={{marginBottom:'1rem',flexWrap:'wrap'}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:16}}>{room.name}</div>
                    <div className="text-sm text-muted">{room.doctor}</div>
                  </div>
                  <button className="btn btn-xs" onClick={()=>setEditRoomModal({...room})}>Edit</button>
                </div>

                <div className="section-title">Currently in room</div>
                {current ? (
                  <div style={{background:'var(--accent-bg)',borderRadius:'var(--radius)',padding:'12px',marginBottom:'0.75rem'}}>
                    <div style={{fontWeight:600}}>{current.name}</div>
                    <div className="text-xs text-muted mono">{current.nric} · {formatSlot(current.slot)}</div>
                    <div className="flex gap-8" style={{marginTop:8,flexWrap:'wrap'}}>
                      {current.services.map(s=>(
                        <span key={s} className={`badge badge-${s==='lpa'?'accent':'purple'}`}>{s.toUpperCase()}</span>
                      ))}
                    </div>
                    <div style={{display:'flex',gap:8,marginTop:10}}>
                      <button className="btn btn-sm btn-green" onClick={()=>markDone(current.id,room.id)}>✓ Done</button>
                      {!current.services.includes('amd') && (
                        <button className="btn btn-sm" onClick={()=>setAddAmdModal({bookingId:current.id})}>+ Add AMD</button>
                      )}
                    </div>
                  </div>
                ) : (
                  <div style={{color:'var(--text3)',fontSize:13,marginBottom:'0.75rem',padding:'8px 0'}}>Room is free</div>
                )}

                <div className="section-title">Call next from queue</div>
                {waitingQueue.filter(b => {
                  const inRoom = state.rooms.some(r => getCurrentForRoom(r.id)?.id === b.id);
                  return !inRoom;
                }).length === 0
                  ? <div style={{color:'var(--text3)',fontSize:13,padding:'8px 0'}}>Queue is empty</div>
                  : waitingQueue.filter(b => {
                    const inRoom = state.rooms.some(r => getCurrentForRoom(r.id)?.id === b.id);
                    return !inRoom;
                  }).slice(0,5).map((b,i) => (
                    <div key={b.id} className="flex-center gap-8" style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                      <span className="text-xs text-muted mono" style={{width:18}}>{i+1}.</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:500}}>{b.name}</div>
                        <div className="text-xs text-muted">{formatSlot(b.slot)}</div>
                      </div>
                      <div className="flex gap-4">
                        {b.services.map(s=>(
                          <span key={s} className={`badge badge-${s==='lpa'?'accent':'purple'}`} style={{fontSize:11}}>{s.toUpperCase()}</span>
                        ))}
                      </div>
                      {!current && (
                        <button className="btn btn-xs btn-primary" onClick={()=>callToRoom(b.id,room.id)}>
                          Call →
                        </button>
                      )}
                    </div>
                  ))
                }
              </div>
            );
          })}
        </div>
      )}

      {/* OVERVIEW TAB */}
      {tab==='overview' && (
        <div className="card">
          <div className="section-title">All bookings ({sortedBookings.length})</div>
          {sortedBookings.length===0
            ? <div className="empty-state">No bookings yet</div>
            : sortedBookings.map((b,i) => (
              <AttendeeRow key={b.id} booking={b} index={i+1} showStatus />
            ))
          }
        </div>
      )}

      {/* EDIT ROOM MODAL */}
      {editRoomModal && (
        <div className="modal-overlay" onClick={()=>setEditRoomModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Edit Room</div>
            <div className="input-group">
              <label className="input-label">Room Name</label>
              <input className="input" value={editRoomModal.name}
                onChange={e=>setEditRoomModal(r=>({...r,name:e.target.value}))} />
            </div>
            <div className="input-group">
              <label className="input-label">Assigned Doctor / Lawyer</label>
              <input className="input" value={editRoomModal.doctor}
                onChange={e=>setEditRoomModal(r=>({...r,doctor:e.target.value}))} />
            </div>
            <div className="flex gap-8">
              <button className="btn btn-primary" style={{flex:1}} onClick={()=>{
                update(s=>({...s,rooms:s.rooms.map(r=>r.id===editRoomModal.id?editRoomModal:r)}));
                setEditRoomModal(null);
              }}>Save</button>
              <button className="btn" onClick={()=>setEditRoomModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD AMD MODAL */}
      {addAmdModal && (
        <div className="modal-overlay" onClick={()=>setAddAmdModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            {addAmdModal.walkIn ? (
              <WalkInForm onSubmit={(data)=>{addWalkIn(data);setAddAmdModal(null);}} onCancel={()=>setAddAmdModal(null)} />
            ) : (
              <>
                <div className="modal-title">Add AMD for this client</div>
                <p className="text-sm text-muted mb-4" style={{marginBottom:'1rem'}}>
                  This client did not originally book AMD. Confirm to add AMD to their session.
                </p>
                <div className="flex gap-8">
                  <button className="btn btn-primary" style={{flex:1}} onClick={()=>{
                    update(s=>({...s,bookings:s.bookings.map(b=>b.id===addAmdModal.bookingId?{...b,services:[...new Set([...b.services,'amd'])],addAmd:true}:b)}));
                    setAddAmdModal(null);
                  }}>Add AMD ✓</button>
                  <button className="btn" onClick={()=>setAddAmdModal(null)}>Cancel</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* SETTINGS MODAL */}
      {settingsModal && (
        <SettingsModal state={state} update={update} onClose={()=>setSettingsModal(false)} />
      )}
    </div>
  );
}

function WalkInForm({ onSubmit, onCancel }) {
  const [form, setForm] = useState({name:'',nric:'',phone:'',services:[],slot:'',notes:''});
  function setField(k,v){setForm(f=>({...f,[k]:v}));}
  function toggleService(s){setForm(f=>({...f,services:f.services.includes(s)?f.services.filter(x=>x!==s):[...f.services,s]}));}
  const valid = form.name.trim() && form.nric.trim() && form.phone.trim() && form.services.length>0 && form.slot;
  return (
    <>
      <div className="modal-title">Register Walk-in Client</div>
      <div className="input-group">
        <label className="input-label">Full Name</label>
        <input className="input" value={form.name} onChange={e=>setField('name',e.target.value)} />
      </div>
      <div className="grid-2">
        <div className="input-group">
          <label className="input-label">NRIC / Last 4</label>
          <input className="input mono" value={form.nric} onChange={e=>setField('nric',e.target.value)} maxLength={9} />
        </div>
        <div className="input-group">
          <label className="input-label">Phone</label>
          <input className="input" value={form.phone} onChange={e=>setField('phone',e.target.value)} />
        </div>
      </div>
      <div className="input-group">
        <label className="input-label">Services</label>
        <div className="flex gap-12 mt-2">
          {[['lpa','LPA'],['amd','AMD']].map(([val,label])=>(
            <label key={val} className="flex-center gap-8" style={{cursor:'pointer'}}>
              <input type="checkbox" checked={form.services.includes(val)} onChange={()=>toggleService(val)} />
              <span style={{fontSize:14}}>{label}</span>
            </label>
          ))}
        </div>
      </div>
      <div className="input-group">
        <label className="input-label">Assign Slot</label>
        <select className="input" value={form.slot} onChange={e=>setField('slot',e.target.value)}>
          <option value="">— select —</option>
          {ALL_SLOTS.map(s=><option key={s} value={s}>{formatSlot(s)}</option>)}
        </select>
      </div>
      <div className="flex gap-8">
        <button className="btn btn-primary" style={{flex:1}} disabled={!valid} onClick={()=>onSubmit(form)}>Register</button>
        <button className="btn" onClick={onCancel}>Cancel</button>
      </div>
    </>
  );
}

function SettingsModal({ state, update, onClose }) {
  const [sessionLabel, setSessionLabel] = useState(state.sessionLabel);
  const [sessionDate, setSessionDate] = useState(state.sessionDate);
  const [pin, setPin] = useState(state.facilitatorPin);
  const [rooms, setRooms] = useState(state.rooms.map(r=>({...r})));

  function addRoom() {
    setRooms(r=>[...r,{id:uid(),name:`Room ${r.length+1}`,doctor:''}]);
  }
  function removeRoom(id) { setRooms(r=>r.filter(x=>x.id!==id)); }
  function updateRoom(id,k,v) { setRooms(r=>r.map(x=>x.id===id?{...x,[k]:v}:x)); }

  function save() {
    update(s=>({...s,sessionLabel,sessionDate,facilitatorPin:pin,rooms}));
    onClose();
  }

  function resetSession() {
    if (window.confirm('This will clear ALL bookings. Are you sure?')) {
      update(s=>({...defaultState(), sessionLabel:s.sessionLabel, sessionDate:s.sessionDate, rooms:s.rooms, facilitatorPin:s.facilitatorPin}));
      onClose();
    }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:560,maxHeight:'80vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Session Settings</div>
        <div className="input-group">
          <label className="input-label">Session Title</label>
          <input className="input" value={sessionLabel} onChange={e=>setSessionLabel(e.target.value)} />
        </div>
        <div className="input-group">
          <label className="input-label">Session Date</label>
          <input className="input" type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)} />
        </div>
        <div className="input-group">
          <label className="input-label">Facilitator PIN</label>
          <input className="input mono" value={pin} onChange={e=>setPin(e.target.value)} maxLength={8} />
        </div>
        <hr className="divider" />
        <div className="section-title">Rooms & Doctors</div>
        {rooms.map((r,i)=>(
          <div key={r.id} style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
            <input className="input" style={{flex:1}} placeholder="Room name" value={r.name} onChange={e=>updateRoom(r.id,'name',e.target.value)} />
            <input className="input" style={{flex:2}} placeholder="Doctor / Lawyer" value={r.doctor} onChange={e=>updateRoom(r.id,'doctor',e.target.value)} />
            <button className="btn btn-xs btn-red" onClick={()=>removeRoom(r.id)}>✕</button>
          </div>
        ))}
        <button className="btn btn-sm" style={{marginBottom:'1rem'}} onClick={addRoom}>+ Add Room</button>
        <hr className="divider" />
        <div className="flex gap-8" style={{flexWrap:'wrap'}}>
          <button className="btn btn-primary" style={{flex:1}} onClick={save}>Save Settings</button>
          <button className="btn" onClick={onClose}>Cancel</button>
        </div>
        <div style={{marginTop:'0.75rem'}}>
          <button className="btn btn-sm btn-red" onClick={resetSession}>⚠ Reset All Bookings</button>
        </div>
      </div>
    </div>
  );
}

function AttendeeRow({ booking: b, index, actions=[], showStatus=false }) {
  const statusMap = {
    booked: {label:'Booked', cls:'badge-gray'},
    arrived: {label:'Arrived', cls:'badge-green'},
    absent: {label:'Absent', cls:'badge-red'},
    done: {label:'Done', cls:'badge-green'},
    in_room_r1: {label:'In Room 1', cls:'badge-amber'},
    in_room_r2: {label:'In Room 2', cls:'badge-amber'},
  };
  const st = statusMap[b.status] || {label:b.status, cls:'badge-gray'};
  return (
    <div className="attendee-row">
      <div className="attendee-num">{index}</div>
      <div className="attendee-info">
        <div className="attendee-name">{b.name}</div>
        <div className="attendee-meta">
          <span className="mono">{b.nric}</span> · <span className="mono">{formatSlot(b.slot)}</span>
          {b.phone && ` · ${b.phone}`}
        </div>
      </div>
      <div className="flex gap-4" style={{flexShrink:0}}>
        {b.services.map(s=>(
          <span key={s} className={`badge badge-${s==='lpa'?'accent':'purple'}`} style={{fontSize:11}}>{s.toUpperCase()}</span>
        ))}
        {b.addAmd && <span className="badge badge-amber" style={{fontSize:11}}>+AMD</span>}
      </div>
      {showStatus && <span className={`badge ${st.cls}`}>{st.label}</span>}
      {actions.length > 0 && (
        <div className="attendee-actions">{actions.map((a,i)=><React.Fragment key={i}>{a}</React.Fragment>)}</div>
      )}
    </div>
  );
}

// DISPLAY PANEL
// ═══════════════════════════════════════════════════════════════════════════
function DisplayPanel({ state }) {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(()=>setNow(new Date()), 1000);
    return ()=>clearInterval(t);
  }, []);

  function getCurrentForRoom(roomId) {
    return state.bookings.find(b => b.status === `in_room_${roomId}`);
  }
  function getNextForRoom(roomId) {
    // next arrived booking not in any room
    const inRoomIds = new Set(
      state.rooms.map(r=>getCurrentForRoom(r.id)).filter(Boolean).map(b=>b.id)
    );
    const arrived = state.bookings
      .filter(b=>b.status==='arrived' && !inRoomIds.has(b.id))
      .sort((a,b)=>a.slot.localeCompare(b.slot));
    return arrived[0] || null;
  }

  const waiting = state.bookings
    .filter(b=>b.status==='arrived')
    .filter(b=>!state.rooms.some(r=>getCurrentForRoom(r.id)?.id===b.id))
    .sort((a,b)=>a.slot.localeCompare(b.slot));

  const timeStr = now.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});

  return (
    <div className="display-root">
      <div className="display-header">
        <div>
          <div className="display-title">LPA · AMD Certification Session</div>
          <div className="display-date">{state.sessionDate}</div>
        </div>
        <div className="display-clock">{timeStr}</div>
      </div>

      <div className="display-rooms">
        {state.rooms.map(room => {
          const current = getCurrentForRoom(room.id);
          const next = getNextForRoom(room.id);
          return (
            <div key={room.id} className="display-room">
              <div className="display-room-label">Room</div>
              <div className="display-room-name">{room.name}</div>
              <div className="display-room-doctor">{room.doctor}</div>

              <div className="display-current-label">Now seeing</div>
              {current ? (
                <>
                  <div className="display-current-name">{current.name}</div>
                  <div className="display-current-type">
                    {current.services.map(s=>(
                      <span key={s} className={`display-pill display-pill-${s}`}>{s.toUpperCase()}</span>
                    ))}
                  </div>
                </>
              ) : (
                <div style={{fontSize:20,color:'#555'}}>—</div>
              )}

              {next && (
                <div className="display-next">
                  <div className="display-next-label">Up next</div>
                  <div className="display-next-name">{next.name}</div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="display-waiting">
        <div className="display-waiting-label">Waiting ({waiting.length})</div>
        {waiting.length === 0
          ? <div style={{color:'#444',fontSize:14}}>No one waiting</div>
          : <div className="display-waiting-list">
              {waiting.map(b=>(
                <div key={b.id} className="display-waiting-chip">
                  {b.name} <span style={{opacity:0.5,fontSize:11,fontFamily:'DM Mono'}}>· {formatSlot(b.slot)}</span>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
